<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quiz Application</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <div class="login-container" style="position: relative; flex-direction: column; min-height: 100vh; padding: 40px 20px; display: flex; justify-content: center; align-items: center;">
        
        <!-- Floating Theme Selector -->
        <div class="login-theme-selector" style="position: absolute; top: 20px; right: 20px; display: flex; align-items: center; gap: 12px; z-index: 100;">
            <div class="theme-accent-selector">
                <button type="button" class="accent-dot blue" onclick="setAccent('blue')" title="Blue Theme"></button>
                <button type="button" class="accent-dot purple" onclick="setAccent('purple')" title="Purple Theme"></button>
                <button type="button" class="accent-dot yellow" onclick="setAccent('yellow')" title="Yellow Theme"></button>
            </div>
            <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleTheme()">☀️</button>
        </div>

        <!-- Header -->
        <div class="header login-header" style="text-align: center; margin-bottom: 25px; padding-bottom: 15px; width: 100%; max-width: 900px;">
            <h1 style="font-size: 28px; margin-bottom: 4px; font-weight: 800;">SDMCET Dharwad</h1>
            <h2 style="font-size: 15px; font-weight: 500; margin-bottom: 4px;">AI & ML Department</h2>
            <h3 style="font-size: 16px; font-weight: bold; margin-top: 8px;">Quiz Assessment Suite</h3>
        </div>

        <div class="login-wrapper">
            <!-- Left Column: Student Login -->
            <div class="login-column">
                <form id="studentForm" class="login-form">
                    <h4 id="studentFormTitle" style="font-size: 18px; margin-bottom: 20px; font-weight: 700; color: var(--text-color);">Student Login</h4>
                    
                    <!-- Dynamic Name Group for Registration -->
                    <div id="nameGroup" class="form-group" style="display: none;">
                        <label for="regName">Full Name</label>
                        <input type="text" id="regName" placeholder="Enter your full name">
                    </div>

                    <div class="form-group">
                        <label id="usnLabel" for="usn">University Seat Number (USN)</label>
                        <input type="text" id="usn" placeholder="Enter 3-digit USN (e.g. 001)" required maxlength="3" pattern="[0-9]{3}">
                        
                    </div>

                    <div class="form-group">
                        <label for="studentPassword">Password</label>
                        <input type="password" id="studentPassword" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" id="studentSubmitBtn" class="btn-login" style="margin-top: 10px;">Login as Student</button>
                    
                    <div class="form-footer" style="text-align: center; margin-top: 25px;">
                        <a href="#" id="toggleStudentAction" style="color: var(--primary-color); text-decoration: none; font-size: 13.5px; font-weight: 600;">Need an account? Register here</a>
                    </div>
                </form>
                <div id="studentMessage" class="message"></div>
            </div>

            <!-- Right Column: Teacher Login -->
            <div class="login-column">
                <form id="teacherForm" class="login-form">
                    <h4 style="font-size: 18px; margin-bottom: 20px; font-weight: 700; color: var(--text-color);">Teacher Login</h4>

                    <div class="form-group">
                        <label for="teacherUsername">Select Name</label>
                        <select id="teacherUsername" required>
                            <option value="">-- Choose Teacher --</option>
                            <option value="yadwad">Dr.R.N.Yadwad</option>
                            <option value="patil_r">Prof.Rajeshwari.V.Patil</option>
                            <option value="sakri">Dr.Leena.I.Sakri</option>
                            <option value="patil_s">Prof.Suprita Patil</option>
                            <option value="nadgir">Prof.Bhargavi.Nadgir</option>
                            <option value="kori">Prof.Daneshwari.N.Kori</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="teacherPassword">Password</label>
                        <input type="password" id="teacherPassword" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" id="teacherSubmitBtn" class="btn-login" style="margin-top: 10px;">Login as Teacher</button>
                </form>
                <div id="teacherMessage" class="message"></div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer login-footer" style="margin-top: 30px; text-align: center; width: 100%; max-width: 900px; padding-top: 15px;">
            <p style="font-size: 13px; margin-bottom: 5px;">4th Semester - Academic Year 2025-26</p>
            <p class="note" style="font-size: 12px; font-style: italic;">for assistance, please contact the administrator</p>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
